<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./src/assets/images/logo-mb.png">
    <title>Mercedes-Benz</title>
  </head>

  <body>
    <!--NAV-->

  <nav class="bg-gradient-to-r from-neutral-300 to-stone-400">
  <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
    <a href="#" class="flex items-center space-x-3 rtl:space-x-reverse">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/90/Mercedes-Logo.svg/960px-Mercedes-Logo.svg.png" class="h-8" alt="Mercedes-Benz Logo" />
      <span class="self-center text-2xl font-semibold whitespace-nowrap text-black">Mercedes-Benz</span>
    </a>
    
    <div class="flex md:order-2 space-x-3 md:space-x-0 rtl:space-x-reverse">
      <!-- Botón "Iniciar Sesión" con el degradado metálico invertido o resaltado para mantener consistencia y contraste al pasar el mouse -->
      <button type="button" class="text-neutral-900 bg-gradient-to-r from-neutral-300 to-stone-400 border border-neutral-500/30 hover:from-stone-400 hover:to-neutral-300 hover:text-black focus:ring-2 focus:outline-none focus:ring-neutral-400 font-semibold rounded-lg text-sm px-5 py-2 text-center transition-all duration-300 shadow-sm">
        Iniciar Sesión
      </button>
      
      <button data-collapse-toggle="navbar-cta" type="button" class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-neutral-800 rounded-lg md:hidden hover:bg-white/20 focus:outline-none focus:ring-2 focus:ring-neutral-400" aria-controls="navbar-cta" aria-expanded="false">
        <span class="sr-only">Open main menu</span>
        <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 17 14">
          <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M1 1h15M1 7h15M1 13h15"/>
        </svg>
      </button>
    </div>

    <!-- Menú de navegación adaptado para ser transparente en desktop y lucir limpio -->
    <div class="items-center justify-between hidden w-full md:flex md:w-auto md:order-1" id="navbar-cta">
      <ul class="flex flex-col font-medium p-4 md:p-0 mt-4 border border-neutral-300/50 rounded-lg bg-neutral-200/50 md:space-x-8 rtl:space-x-reverse md:flex-row md:mt-0 md:border-0 md:bg-transparent">
        <li>
          <a href="#" class="block py-2 px-3 md:p-0 text-neutral-950 font-bold md:bg-transparent" aria-current="page">Inicio</a>
        </li>
        <li>
          <a href="#" class="block py-2 px-3 md:p-0 text-neutral-800 rounded-sm hover:bg-white/20 md:hover:bg-transparent md:hover:text-black transition-colors">Modelos</a>
        </li>
        <li>
          <a href="#" class="block py-2 px-3 md:p-0 text-neutral-800 rounded-sm hover:bg-white/20 md:hover:bg-transparent md:hover:text-black transition-colors">Servicio</a>
        </li>
        <li>
          <a href="#" class="block py-2 px-3 md:p-0 text-neutral-800 rounded-sm hover:bg-white/20 md:hover:bg-transparent md:hover:text-black transition-colors">Contacto</a>
        </li>
      </ul>
    </div>
  </div>
  </nav>


    <script type="module" src="/src/js/main.js"></script>

    <!--HERO-->
    <div class="container px-6 py-16 mx-auto">
    <div class="items-center lg:flex">
        <div class="w-full lg:w-1/2">
            <div class="lg:max-w-lg">
                <!-- Título con tipografía más elegante y sobria (jugando con pesos de fuente) -->
                <h1 class="text-3xl font-light tracking-tight text-gray-900 dark:text-white lg:text-5xl leading-tight">
                    La definición de <br> 
                    <span class="font-semibold text-neutral-800 dark:text-neutral-300">lujo moderno</span>
                </h1>
                
                <!-- Copia premium que reemplaza al Lorem Ipsum -->
                <p class="mt-4 text-gray-600 dark:text-gray-400 leading-relaxed">
                    Experimenta la sinergia perfecta entre ingeniería alemana de vanguardia, confort excepcional y una movilidad diseñada para liderar el mañana.
                </p>
                
                <!-- Botón con bordes más rectos (rounded-sm) y paleta de color monocromática premium -->
                <button class="w-full px-8 py-3 mt-8 text-xs font-semibold tracking-widest text-white uppercase transition-colors duration-300 transform bg-neutral-950 rounded-sm lg:w-auto hover:bg-neutral-800 focus:outline-none focus:bg-neutral-800 dark:bg-white dark:text-neutral-950 dark:hover:bg-neutral-200">
                    Explorar modelos
                </button>
            </div>
        </div>

        <!-- Imagen de un vehículo de alta calidad con fondo limpio y sombra suave -->
        <div class="flex items-center justify-center w-full mt-8 lg:mt-0 lg:w-1/2">
            <img class="w-full h-auto object-contain lg:max-w-2xl drop-shadow-2xl rounded-lg" 
              src="https://automercol.com.co/wp-content/uploads/2025/09/mercedes_inicio_amg-cle-coupe.webp" 
              alt="Mercedes-Benz Clase S Coupe">
        </div>
      </div>
    </div>






  </body>

</html>
